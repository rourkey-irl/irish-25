<!DOCTYPE html>
<html>
<head>
  <title>Irish 25 вҖ” engine tests</title>
  <style>
    body { font-family: monospace; background: #1a1a1a; color: #ccc; padding: 2rem; }
    .pass { color: #4ade80; }
    .fail { color: #f87171; }
    .section { color: #ffd700; margin-top: 1rem; }
    .summary { margin-top: 1rem; font-size: 1.1rem; font-weight: bold; }
  </style>
</head>
<body>
<div id="out"></div>
<script src="game.js"></script>
<script>
  let passed = 0, failed = 0;
  const out = document.getElementById('out');

  function c(suit, value) { return { suit, value }; }

  function normCards(arr) {
    return arr.map(card => `${card.value}${card.suit[0].toUpperCase()}`).sort().join(', ');
  }

  function section(title) {
    out.innerHTML += `<div class="section">в”Җв”Җ ${title} в”Җв”Җ</div>`;
  }

  function assertEq(desc, actual, expected) {
    const ok = actual === expected;
    ok ? passed++ : failed++;
    out.innerHTML += `<div class="${ok ? 'pass' : 'fail'}">${ok ? 'вң…' : 'вқҢ'} ${desc}${ok ? '' : `<br>&nbsp;&nbsp;&nbsp;got:      ${actual}<br>&nbsp;&nbsp;&nbsp;expected: ${expected}`}</div>`;
  }

  function assertCards(desc, actual, expected) {
    const a = normCards(actual), e = normCards(expected);
    const ok = a === e;
    ok ? passed++ : failed++;
    out.innerHTML += `<div class="${ok ? 'pass' : 'fail'}">${ok ? 'вң…' : 'вқҢ'} ${desc}${ok ? '' : `<br>&nbsp;&nbsp;&nbsp;got:      ${a}<br>&nbsp;&nbsp;&nbsp;expected: ${e}`}</div>`;
  }

  // в”Җв”Җ Trump ranking в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
  section('Trump ranking (hearts is trump)');
  assertEq('5вҷҘ = 100 (highest trump)',   Game.rankCard(c('hearts','5'), 'hearts'), 100);
  assertEq('JвҷҘ = 99 (second trump)',     Game.rankCard(c('hearts','J'), 'hearts'), 99);
  assertEq('AвҷҘ = 98 (third trump)',      Game.rankCard(c('hearts','A'), 'hearts'), 98);
  assertEq('KвҷҘ = 80 (next after top 3)', Game.rankCard(c('hearts','K'), 'hearts'), 80);

  // в”Җв”Җ AвҷҘ as permanent trump в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
  section('AвҷҘ is always a trump regardless of trump suit');
  assertEq('isTrump(AвҷҘ) when spades is trump', Game.isTrump(c('hearts','A'), 'spades'), true);
  assertEq('isTrump(AвҷҘ) when clubs is trump',  Game.isTrump(c('hearts','A'), 'clubs'),  true);
  assertEq('AвҷҘ rank = 98 when spades is trump', Game.rankCard(c('hearts','A'), 'spades'), 98);

  // в”Җв”Җ Trick winner в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
  section('Trick winner');
  const trick1 = [
    { card: c('clubs','K'),  playerIndex: 0 },
    { card: c('hearts','2'), playerIndex: 1 },
    { card: c('clubs','A'),  playerIndex: 2 },
  ];
  assertEq('2вҷҘ (trump) beats KвҷЈ and AвҷЈ вҖ” player 1 wins', Game.trickWinner(trick1, 'hearts').playerIndex, 1);

  const trick2 = [
    { card: c('spades','K'), playerIndex: 0 },
    { card: c('spades','9'), playerIndex: 1 },
    { card: c('spades','A'), playerIndex: 2 },
  ];
  assertEq('No trump played вҖ” Kвҷ  (led, highest black non-trump) wins', Game.trickWinner(trick2, 'hearts').playerIndex, 0);

  // в”Җв”Җ Non-trump led: legalCards в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
  section('Non-trump led (hearts is trump, clubs is led)');

  assertCards(
    '1. Has led suit only вҖ” only clubs legal',
    Game.legalCards([c('clubs','K'), c('clubs','Q'), c('diamonds','5')], c('clubs','2'), 'hearts'),
    [c('clubs','K'), c('clubs','Q')]
  );

  assertCards(
    '2. Has led suit AND a trump вҖ” clubs AND trump legal, not diamonds',
    Game.legalCards([c('clubs','K'), c('hearts','2'), c('diamonds','5')], c('clubs','2'), 'hearts'),
    [c('clubs','K'), c('hearts','2')]
  );

  assertCards(
    '3. Void in led suit, has trumps вҖ” any card legal',
    Game.legalCards([c('diamonds','K'), c('hearts','2'), c('spades','5')], c('clubs','2'), 'hearts'),
    [c('diamonds','K'), c('hearts','2'), c('spades','5')]
  );

  assertCards(
    '4. Void in led suit, no trumps вҖ” any card legal',
    Game.legalCards([c('diamonds','K'), c('diamonds','5'), c('diamonds','3')], c('clubs','2'), 'hearts'),
    [c('diamonds','K'), c('diamonds','5'), c('diamonds','3')]
  );

  assertCards(
    '5. Non-trump led, AвҷҘ counts as trump when spades is trump',
    Game.legalCards([c('clubs','K'), c('hearts','A')], c('clubs','2'), 'spades'),
    [c('clubs','K'), c('hearts','A')]
  );

  // в”Җв”Җ Trump led: legalCards & reneging в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
  section('Trump led (hearts is trump)');

  assertCards(
    '6. Has regular trump (not 5/J/AвҷҘ) вҖ” must follow trump',
    Game.legalCards([c('hearts','2'), c('clubs','K')], c('hearts','3'), 'hearts'),
    [c('hearts','2')]
  );

  assertCards(
    '7. Holds only 5вҷҘ (top trump), lower trump led вҖ” can renege, full hand legal',
    Game.legalCards([c('hearts','5'), c('clubs','K')], c('hearts','3'), 'hearts'),
    [c('hearts','5'), c('clubs','K')]
  );

  assertCards(
    '8. Holds only JвҷҘ, lower trump led вҖ” can renege',
    Game.legalCards([c('hearts','J'), c('clubs','K')], c('hearts','3'), 'hearts'),
    [c('hearts','J'), c('clubs','K')]
  );

  assertCards(
    '9. Holds only AвҷҘ (spades trump), lower spade trump led вҖ” can renege',
    Game.legalCards([c('hearts','A'), c('clubs','K')], c('spades','3'), 'spades'),
    [c('hearts','A'), c('clubs','K')]
  );

  assertCards(
    '10. Holds JвҷҘ, 5вҷҘ led вҖ” cannot renege (J rank 99 < 5 rank 100)',
    Game.legalCards([c('hearts','J'), c('clubs','K')], c('hearts','5'), 'hearts'),
    [c('hearts','J')]
  );

  assertCards(
    '11. Holds AвҷҘ, JвҷҘ led вҖ” cannot renege (AвҷҘ rank 98 < JвҷҘ rank 99)',
    Game.legalCards([c('hearts','A'), c('clubs','K')], c('hearts','J'), 'hearts'),
    [c('hearts','A')]
  );

  // в”Җв”Җ Summary в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
  const total = passed + failed;
  out.innerHTML += `<div class="summary ${failed === 0 ? 'pass' : 'fail'}">${passed}/${total} passed${failed > 0 ? ` вҖ” ${failed} FAILED` : ' вң…'}</div>`;
</script>
</body>
</html>
